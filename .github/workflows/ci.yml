name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (tests + package)
        run: ./mvnw -B -ntp verify

      - name: Upload jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: mock-brevo-jar
          path: target/mock-brevo-*.jar
          retention-days: 7

  docker-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (local, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: mock-brevo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image + hit /mock-status
        run: |
          docker run --rm -d --name mb -p 18080:8080 mock-brevo:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:18080/mock-status >/dev/null; then
              echo "mock-brevo is up"
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:18080/mock-status | head -c 200; echo
          curl -fsS -H 'api-key: ci-smoke' http://localhost:18080/v3/account | head -c 200; echo
          docker stop mb
